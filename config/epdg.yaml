epdg:
  name: epdg2.epc.mnc435.mcc311.3gppnetwork.org
  realm: epc.mnc435.mcc311.3gppnetwork.org
  mcc: "311"
  mnc: "435"
  mnc_length: 3

logging:
  level: warn
  file: /var/log/vectorcore/epdg/epdg.log

ikev2:
  listen_addr: 0.0.0.0
  #listen_addr_v6: "::"  # optional: also bind IPv6 (dual-stack); empty/absent = IPv6 disabled
  # listen_ifname: eth0   # optional: bind to a specific interface
  cert_file: config/certs/epdgCert.pem
  key_file:  config/certs/epdgKey.pem
  ca_file:   config/certs/ca.pem
  dpd_enabled: true
  dpd_delay: 30
  dpd_timeout: 120  # seconds to wait for DPD response before tearing down

swm:
  # peer_addr/peer_port is the immediate Diameter peer.
  # For direct SWm, set this to the AAA address.
  # For DRA relay, set this to the DRA listener address and use destination_realm
  # plus optional destination_host for the final AAA routing target.
  local_addr: 10.90.250.57
  peer_addr: 10.90.250.35
  peer_port: 3868
  proto: sctp # tcp | sctp
  origin_host: epdg2.epc.mnc435.mcc311.3gppnetwork.org
  origin_realm: epc.mnc435.mcc311.3gppnetwork.org
  # Leave destination_host empty or omit it when the DRA should route by realm.
  # Set destination_host to the final AAA host for direct host routing.
  # destination_host: aaa01.epc.mnc435.mcc311.3gppnetwork.org
  destination_realm: epc.mnc435.mcc311.3gppnetwork.org
  watchdog_interval_seconds: 30
  watchdog_timeout_seconds: 10

gtp:
  local_gtpc: 10.90.250.57
  local_gtpu: 10.90.250.57
  local_port: 2152
  pgw_gtpc: 10.90.250.92
  mtu: 1400
  validate_outer_peer: true
  strict_peer_check: true
  max_sequence: 8388607  # Cisco StarOS qvpc-si: rejects bit-23 sequences (StarOS defect).

pgw_discovery:
  # dns_enabled: false enables per-attach PGW discovery via DNS S-NAPTR (3GPP TS 29.303).
  # When false, pgw_gtpc is used directly. Disable for cores without DNS discovery (e.g. Open5GS).
  dns_enabled: true
  # allow_s5s8_fallback: when true, fall back to x-s5-gtp/x-s8-gtp NAPTR records if no
  # x-s2b-gtp record exists. Useful when the MME registered the PGW but the ePDG-specific
  # service tag is absent (common in deployments where only an MME-facing record is published).
  allow_s5s8_fallback: true

bpf:
  xdp_attach_mode: generic   # generic works on any NIC; use native for full performance on supported drivers
  xdp_interface: ens18       # S2b NIC receiving GTP-U from PGW and used for uplink redirect
  map_max_entries: 8192     # one entry per active UE session

dedicated_bearers:
  enabled: true
  tft_uplink_selection: true

apn:
  default: ims

pco:
  enabled: true
  request_dns_v4: true
  request_dns_v6: false
  request_pcscf_v4: true
  request_pcscf_v6: false
  include_apco: true
  strict_decode: false

shutdown:
  timeout_seconds: 5
